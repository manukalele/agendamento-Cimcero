  const erroClin = document.createElement('div'); erroClin.className = 'erro-msg'
  fieldClinica.appendChild(lblClin); fieldClinica.appendChild(sbClinica); fieldClinica.appendChild(erroClin)

  const calHorLab = criarCalendarioHorario()
  const calWrapLab = calHorLab.wrapper

  // Compat shim para o código existente que usa inputData / inputHorario
  const inputData = {
    get value() { return calHorLab.getValue().data },
    set value(_) { calHorLab.resetar() },
    classList: { add(c) { if(c==='erro') calHorLab.setErroData() }, remove(c) { if(c==='erro') calHorLab.limparErroData() } }
  }
  const inputHorario = {
    get value() { return calHorLab.getValue().horario },
    set value(v) { if (!v) { const inp = calHorLab.wrapper.querySelector('.cal-horario-input'); if (inp) inp.value = '' } },
    classList: { add(c) { if(c==='erro') calHorLab.setErroHorario() }, remove(c) { if(c==='erro') calHorLab.limparErroHorario() } }

  gridCampos.appendChild(fieldClinica); gridCampos.appendChild(calWrapLab)

  // tipoFiltro='lab' garante que o fallback local nunca carregue exames de clínicas médicas. (Bug #1)
  const campoExamesAgendar = criarCampoExamesClinica(atualizarValorHeader, 'lab')

  // Quando a clínica de agendamento muda, recarrega os itens do searchbox de exames
  // e exibe o botão de importar orçamento
  const atualizarBtnImportar = () => {
    const temExames = campoExamesOrc.temExames()
    btnImportarOrc.disabled = !temExames
    btnImportarOrc.style.opacity = temExames ? '1' : '0.4'
    btnImportarOrc.style.pointerEvents = temExames ? '' : 'none'

  sbClinica.onSelect(item => {
    atualizarResumo()

  sbClinica.onConfirm(item => {
    campoExamesAgendar.atualizarClinica(item.value)
    atualizarResumo()
    alertaIndisp.classList.remove('visivel')
    btnImportarOrc.style.display = ''
    atualizarBtnImportar()

  const fieldExA = document.createElement('div'); fieldExA.className = 'field full'
  const lblExA   = document.createElement('label'); lblExA.textContent = 'Exames'
  const erroExA  = document.createElement('div'); erroExA.className = 'erro-msg'
  fieldExA.appendChild(lblExA); fieldExA.appendChild(campoExamesAgendar); fieldExA.appendChild(erroExA)

  // Botão importar orçamento — aparece após clínica selecionada
  const btnImportarOrc = document.createElement('button')
  btnImportarOrc.className = 'btn-add-clinica'
  btnImportarOrc.textContent = '↓ importar exames do orçamento'
  btnImportarOrc.style.display = 'none'
  btnImportarOrc.addEventListener('click', () => {
    const clinicaId = btnImportarOrc.dataset.clinicaId
    const examesOrc = campoExamesOrc.getExames()
    if (!examesOrc.length) {
      erroExO.textContent = 'adicione ao menos um exame ao orçamento antes de importar'
      setTimeout(() => { erroExO.textContent = '' }, 3000)

    // Cruza exames do orçamento com o catálogo da clínica selecionada

      const exame   = banco.exames.find(e => e.nome_parametro === nomeParam)
      const entrada = exame?.clinicas.find(c => String(c.clinica_id) === String(clinicaId))  // Bug #2a

        disponiveis.push({ nome_real: exame.nome_real, id_exame_clinica: entrada.id_exame_clinica, preco: entrada.preco })
      } else {
        indisponiveis.push(nomeParam)
      }

    campoExamesAgendar.preencherExames(disponiveis)

    if (indisponiveis.length) {
      alertaIndisp.textContent = `⚠️ não disponíveis nesta clínica: ${indisponiveis.join(', ')}`
      alertaIndisp.classList.add('visivel')
    } else {
      alertaIndisp.classList.remove('visivel')
    }

  // Alerta de exames indisponíveis
  const alertaIndisp = document.createElement('div'); alertaIndisp.className = 'alerta-indisp'

  secaoAgendar.appendChild(fieldExA)
  secaoAgendar.appendChild(alertaIndisp); secaoAgendar.appendChild(statusDiv)

  // ── SEÇÃO ORÇAMENTO ──────────────────────────────────────
  const secaoOrcamento = document.createElement('div')

  secaoOrcamento.style.display = 'none'

  // Searchbox clínica orçamento com opção "Todos"

  const lblClinOrc = document.createElement('label'); lblClinOrc.textContent = 'Laboratório'

    { value: '__todos__', label: '★ Todos os laboratórios', especial: true },
    ...laboratorios.map(c => ({ value: c.id, label: c.nome }))
  ]
  const sbClinicaOrc = criarSearchbox(itensClinicasOrc, 'todos ou escolha um...')
  // Pré-seleciona "Todos"
  sbClinicaOrc.querySelector('input[type="hidden"]').dataset.valor = '__todos__'
  sbClinicaOrc.querySelector('input[type="text"]').value = '★ Todos os laboratórios'
  const erroClinicaOrc = document.createElement('div'); erroClinicaOrc.className = 'erro-msg'
  fieldClinicaOrc.appendChild(lblClinOrc); fieldClinicaOrc.appendChild(sbClinicaOrc); fieldClinicaOrc.appendChild(erroClinicaOrc)

  // Campo exames orçamento
  const fieldExO = document.createElement('div'); fieldExO.className = 'field full'
  const lblExO   = document.createElement('label'); lblExO.textContent = 'Exames'
  const campoExamesOrc = criarCampoExamesOrcamento()
  const erroExO  = document.createElement('div'); erroExO.className = 'erro-msg'
  fieldExO.appendChild(lblExO); fieldExO.appendChild(campoExamesOrc); fieldExO.appendChild(erroExO)

  const listaOrcObserver = new MutationObserver(() => { atualizarValorSpan(); atualizarBtnImportar() })
  listaOrcObserver.observe(campoExamesOrc.querySelector('.exames-lista'), { childList: true })
  // Registra função de limpeza para ser chamada antes de destruir o card
  card._desconectarObservers = () => listaOrcObserver.disconnect()

  const btnGerarOrc = document.createElement('button')
  btnGerarOrc.className = 'btn-gerar-orc'; btnGerarOrc.textContent = 'Gerar orçamento'

  const resultadoOrc = document.createElement('div'); resultadoOrc.className = 'orc-resultado'

  btnGerarOrc.addEventListener('click', () => {
    erroExO.textContent = ''
    if (!campoExamesOrc.temExames()) { erroExO.textContent = 'adicione ao menos um exame'; return }
    const filtroId     = sbClinicaOrc.getValor() === '__todos__' ? null : sbClinicaOrc.getValor()
    const nomePaciente = blocoPaciente.getNome()
    const orcamento    = calcularOrcamento(campoExamesOrc.getExames(), filtroId, laboratorios)
    renderizarOrcamento(resultadoOrc, orcamento, nomePaciente)
    card.classList.add('orcando')
    atualizarValorSpan()
  })

  secaoOrcamento.appendChild(btnGerarOrc)
  secaoOrcamento.appendChild(fieldClinicaOrc)
  secaoOrcamento.appendChild(fieldExO)
  secaoOrcamento.appendChild(resultadoOrc)

  // Calcula o total do orçamento a partir dos exames selecionados no campoExamesOrc
  // usando o primeiro preço disponível no banco (mesmo critério do fallback)
  const totalOrcamento = () => {
    return campoExamesOrc.getExames().reduce((acc, nomeParam) => {
      const exame = banco.exames.find(e => e.nome_parametro === nomeParam)
      return acc + (exame?.clinicas[0]?.preco ?? 0)
    }, 0)
  }

  const atualizarValorSpan = () => {
    atualizarResumo()
    if (modoAtual === 'agendar') {
      const total  = campoExamesAgendar.getTotal()
      const count  = campoExamesAgendar.getExames().length
      const sufixo = count > 0 ? ` (${count} exame${count > 1 ? 's' : ''})` : ''
      valorSpan.textContent = formatarMoeda(total) + sufixo
      valorSpan.classList.toggle('zero', total === 0)
    } else {
      const total = totalOrcamento()
      const count = campoExamesOrc.getExames().length
      const sufixo = count > 0 ? ` (${count} exame${count > 1 ? 's' : ''})` : ''
      valorSpan.textContent = total ? `~${formatarMoeda(total)}${sufixo}` : 'orçamento'
      valorSpan.classList.toggle('zero', total === 0)
    }
  }

  // ── Toggle entre modos (preserva estado ao trocar) ───────
  let modoAtual = 'agendar'
  btnAgendar.addEventListener('click', e => {
    e.stopPropagation(); modoAtual = 'agendar'
    btnAgendar.classList.add('ativo'); btnOrcamento.classList.remove('ativo')
    secaoAgendar.style.display = ''; secaoOrcamento.style.display = 'none'
    valorSpan.style.display = ''; card.classList.remove('orcando')
    atualizarValorSpan(); atualizarBotoesLimpar()
  })
  btnOrcamento.addEventListener('click', e => {
    e.stopPropagation(); modoAtual = 'orcamento'
    btnOrcamento.classList.add('ativo'); btnAgendar.classList.remove('ativo')
    secaoAgendar.style.display = 'none'; secaoOrcamento.style.display = 'flex'
    secaoOrcamento.style.flexDirection = 'column'; secaoOrcamento.style.gap = '.85rem'
    valorSpan.style.display = ''
    atualizarValorSpan(); atualizarBotoesLimpar()
  })
  btnLimparPaciente.addEventListener('click', e => {
    e.stopPropagation()
    blocoPaciente.resetar()
    nomeSpan.textContent = `lab #${contadorLab}`
    nomeSpan.classList.add('vazio')
    metaSpan.innerHTML = ''
    atualizarValorSpan()
  })
  btnLimparLab.addEventListener('click', e => {
    e.stopPropagation()
    if (modoAtual === 'agendar') {
      sbClinica.resetar()
      calHorLab.resetar()
      campoExamesAgendar.atualizarClinica(null)
      alertaIndisp.classList.remove('visivel')
      btnImportarOrc.style.display = 'none'
    } else {
      campoExamesOrc.limpar()
      atualizarBtnImportar()
      resultadoOrc.innerHTML = ''
      card.classList.remove('orcando')
    }
    atualizarValorSpan()
  })
  // ocultar botões de limpar no modo orçamento (só fazem sentido no agendar)
  const atualizarBotoesLimpar = () => {
    const isAgendar = modoAtual === 'agendar'
    btnLimparPaciente.style.display = isAgendar ? '' : 'none'
    btnLimparLab.style.display      = ''
  }

  body.appendChild(toggle)
  body.appendChild(blocoPaciente)
  body.appendChild(secaoAgendar)
  body.appendChild(secaoOrcamento)

  card.appendChild(top); card.appendChild(body)
  lista.appendChild(card); atualizarCountColunas()
  card.classList.add('entrando'); setTimeout(() => card.classList.remove('entrando'), 300)

  card._tipo     = 'lab'
  card._getCheck = () => false
  card._modoEdicao   = false
  card._miniEmEdicao = null
  card._setModo = (modo) => {
    if (modo === 'orcamento') btnOrcamento.click()
    else btnAgendar.click()
  }
  card._atualizarResumo = atualizarResumo

  // Função interna: captura snapshot do estado atual do card lab
  const _capturarSnapshot = () => {
    if (modoAtual === 'agendar') {
      return {
        modo: 'agendar',
        pacienteCodigo: blocoPaciente.getCodigo(),
        clinicaId:    sbClinica.getValor(),
        clinicaLabel: sbClinica.getLabel(),
        exames:       campoExamesAgendar.getExames(),
        data:         calHorLab.getValue().data,
        horario:      calHorLab.getValue().horario
      }
    } else {
      return {
        modo: 'orcamento',
        pacienteCodigo: blocoPaciente.getCodigo(),
        clinicaOrcId:    sbClinicaOrc.getValor(),
        clinicaOrcLabel: sbClinicaOrc.getLabel(),
        examesOrc:       campoExamesOrc.getExames()
      }
    }
  }

  // Alterna UI entre modo normal e modo edição
  const _atualizarUiEdicao = () => {
    if (card._modoEdicao) {
      card.classList.add('card-em-edicao')
      btnSalvarFila.style.display = 'none'
      btnSalvarAlteracoes.style.display = ''
      btnCancelarEdicao.style.display   = ''
    } else {
      card.classList.remove('card-em-edicao')
      btnSalvarFila.style.display = ''
      btnSalvarAlteracoes.style.display = 'none'
      btnCancelarEdicao.style.display   = 'none'
    }
  }

  // Inicia edição: restaura estado do snapshot e entra em modo edição
  card._iniciarEdicao = async (mini) => {
    const snap = mini._snapshot
    if (!snap) return

    // Se card foi destruído pelo reset automático pós-salvamento, recriar e redirecionar
    if (!document.contains(card)) {
      adicionarCardLab()
      const novoCard = document.querySelector('#listaLab .card')
      mini._cardRef = novoCard
      await novoCard._iniciarEdicao(mini)
      return
    }

    // (1) Restaurar modo
    card._setModo(snap.modo)

    // (2) Restaurar paciente
    if (snap.pacienteCodigo) {
      const inputCod = blocoPaciente.querySelector('input[type="text"]')
      if (inputCod) {
        inputCod.value = snap.pacienteCodigo
        inputCod.dispatchEvent(new Event('input'))
      }
    }

    // (3a) Restaurar modo agendar
    if (snap.modo === 'agendar') {
      if (snap.clinicaId) {
        sbClinica.preencherValor(snap.clinicaId, snap.clinicaLabel)
        await campoExamesAgendar.atualizarClinica(snap.clinicaId)
        btnImportarOrc.style.display = ''
        btnImportarOrc.dataset.clinicaId = snap.clinicaId
      }
      if (snap.exames?.length) campoExamesAgendar.preencherExames(snap.exames)
      if (snap.data || snap.horario) calHorLab.setValue(snap.data, snap.horario)
    }

    // (3b) Restaurar modo orçamento
    if (snap.modo === 'orcamento') {
      if (snap.clinicaOrcId && snap.clinicaOrcId !== '__todos__') {
        sbClinicaOrc.preencherValor(snap.clinicaOrcId, snap.clinicaOrcLabel)
      }
      if (snap.examesOrc?.length) campoExamesOrc.restaurarExames(snap.examesOrc)
    }

    // (4) Entrar em modo edição visual no card
    card._modoEdicao = true
    card._miniEmEdicao = mini
    _atualizarUiEdicao()
  }

  // Salvar alterações: atualiza snapshot e mini-card, sai do modo edição
  btnSalvarAlteracoes.addEventListener('click', e => {
    e.stopPropagation()
    const mini = card._miniEmEdicao
    if (!mini) return

    const novoSnap = _capturarSnapshot()
    mini._snapshot = novoSnap

    const nomePac = blocoPaciente?.getCodigo()
      ? blocoPaciente.getNome() : '⚠ sem paciente'
    let valorAtual
    if (modoAtual === 'orcamento') {
      const total = totalOrcamento()
      const count = campoExamesOrc.getExames().length
      const sufixo = count > 0 ? ` (${count} exame${count > 1 ? 's' : ''})` : ''
      valorAtual = total ? `~${formatarMoeda(total)}${sufixo}` : 'orçamento'
    } else {
      valorAtual = valorSpan ? valorSpan.textContent : 'R$ 0,00'
    }
    const labLabel = modoAtual === 'orcamento' ? '' : (sbClinica ? sbClinica.getLabel() : '')

    mini._nome         = nomePac
    mini._valor        = valorAtual
    mini._labelClinica = labLabel
    mini._modoCard     = modoAtual
    mini.classList.toggle('mc-sem-paciente', nomePac === '⚠ sem paciente')

    mini._marcado = mini._marcadoAntes ?? true
    mini.classList.toggle('marcado', mini._marcado)
    mini.classList.remove('mc-em-edicao')
    if (mini._rebuild) mini._rebuild()
    atualizarRodapePainel()

    card._modoEdicao = false
    card._miniEmEdicao = null
    _atualizarUiEdicao()
    _edicaoEmAndamento = false
    _restaurarTabs()
    adicionarCardLab()
    requestAnimationFrame(() => {
      const inputFoco = document.querySelector('#listaLab .card input[type="text"]')
      if (inputFoco) inputFoco.focus()
    })
  })

  // Cancelar edição: sai do modo edição e apresenta card vazio
  btnCancelarEdicao.addEventListener('click', e => {
    e.stopPropagation()
    const mini = card._miniEmEdicao
    if (!mini) return

    mini._marcado = mini._marcadoAntes ?? true
    mini.classList.toggle('marcado', mini._marcado)
    mini.classList.remove('mc-em-edicao')
    if (mini._rebuild) mini._rebuild()
    atualizarRodapePainel()

    card._modoEdicao = false
    card._miniEmEdicao = null
    _atualizarUiEdicao()
    _edicaoEmAndamento = false
    _restaurarTabs()
    adicionarCardLab()
    requestAnimationFrame(() => {
      const inputFoco = document.querySelector('#listaLab .card input[type="text"]')
      if (inputFoco) inputFoco.focus()
    })
  })
  // I3 — sincroniza nome e indicador do mini-card quando paciente é preenchido
  card._sincronizarMiniCard = () => {
    const mini = [...document.getElementById('listaPendentes')
      .querySelectorAll('.mini-card')].find(m => m._cardRef === card)
    if (!mini) return
    const temCodigo = blocoPaciente.getCodigo()
    mini._nome = temCodigo ? blocoPaciente.getNome() : '⚠ sem paciente'
    mini.classList.toggle('mc-sem-paciente', !temCodigo)
    if (mini._rebuild) mini._rebuild()
    atualizarRodapePainel()
  }
  // I1 — atualiza label do botão conforme estado da fila
  card._atualizarBtnFila = () => {
    const mini = [...document.getElementById('listaPendentes')
      .querySelectorAll('.mini-card')].find(m => m._cardRef === card)
    btnSalvarFila.textContent = mini ? '✎ Atualizar na fila' : '＋ Salvar na Fila'
  }
  card._getDados = () => {
    if (modoAtual !== 'agendar') return null
    const erros = []
    if (!blocoPaciente.getCodigo()) { blocoPaciente.setErro(); erros.push('codigo') } else blocoPaciente.limparErro()
    if (!sbClinica.getValor())      { sbClinica.setErro();     erros.push('clinica') } else sbClinica.limparErro()
    if (!inputData.value)           { inputData.classList.add('erro');    erros.push('data')    } else inputData.classList.remove('erro')
    if (!inputHorario.value)        { inputHorario.classList.add('erro'); erros.push('horario') } else inputHorario.classList.remove('erro')
    if (!campoExamesAgendar.temExames()) { campoExamesAgendar.setErro(); erros.push('exames') } else campoExamesAgendar.limparErro()
    if (erros.length) return false
    return [{ codigoPaciente: blocoPaciente.getCodigo(), cpfPaciente: blocoPaciente.getDados()?.cpf || null, datanascPaciente: blocoPaciente.getDados()?.datanasc || null, codigoClinica: sbClinica.getValor(), exames: campoExamesAgendar.getExames(), data: inputData.value, horario: inputHorario.value, tipoCard: 'lab' }]
  }
  card._setStatus = (tipo, msg) => {
    statusDiv.textContent = msg; statusDiv.className = `card-status visivel ${tipo}`
    card.classList.toggle('processado', tipo === 'ok'); card.classList.toggle('erro', tipo === 'erro')
  }
}

// ─────────────────────────────────────────────────────────────
// CARD CLÍNICAS MÉDICAS — sem alteração
// ─────────────────────────────────────────────────────────────
function adicionarCardClinica() {
  contadorClinicas++
  const lista = document.getElementById('listaClinicas'), subcards = []

  // Apenas um card por coluna — limpa anterior
  lista.innerHTML = ''

  const card  = document.createElement('div'); card.className = 'card'

  const top = document.createElement('div'); top.className = 'card-top'
  const btnSalvarFila = document.createElement('button'); btnSalvarFila.className = 'btn-salvar-fila'; btnSalvarFila.textContent = '＋ Salvar na Fila'
  const btnSalvarAlteracoesClin = document.createElement('button')
  btnSalvarAlteracoesClin.className = 'btn-salvar-fila salvo'
  btnSalvarAlteracoesClin.textContent = '✓ salvar alterações'
  btnSalvarAlteracoesClin.style.display = 'none'
  const btnCancelarEdicaoClin = document.createElement('button')
  btnCancelarEdicaoClin.className = 'btn-rem'
  btnCancelarEdicaoClin.textContent = '✕ cancelar edição'
  btnCancelarEdicaoClin.style.display = 'none'
  btnSalvarFila.addEventListener('click', e => {
    e.stopPropagation()
    // I1 — detectar modo atualizar vs salvar
    const listaPendentes = document.getElementById('listaPendentes')
    const miniAtivo = [...listaPendentes.querySelectorAll('.mini-card')].find(m => m._cardRef === card)
    // Validação mínima: paciente e clínica obrigatórios; exames, data e horário opcionais ao salvar
    const temConteudo = _blocoPacienteClin?.getCodigo() &&
      subcards.length > 0 &&
      subcards.every(sc => sc.getClinica())
    if (!temConteudo) {
      // Marcar campos faltantes visualmente
      if (!_blocoPacienteClin?.getCodigo()) blocoPaciente.setErro()
      subcards.forEach(sc => { if (!sc.getClinica()) sc.sbClin.setErro() })
      setTimeout(() => {
        blocoPaciente.limparErro()
        subcards.forEach(sc => sc.sbClin.limparErro())
      }, 2500)
      // Shake + texto de erro no botão
      btnSalvarFila.textContent = '⚠ preencha os campos'
      btnSalvarFila.classList.add('erro-shake')
      setTimeout(() => {
        btnSalvarFila.classList.remove('erro-shake')
        btnSalvarFila.textContent = miniAtivo ? '✎ Atualizar na fila' : '＋ Salvar na Fila'
      }, 2000)
      return
    }
    // I2 — nome com placeholder se sem paciente
    const nomePac = _blocoPacienteClin?.getCodigo()
      ? _blocoPacienteClin.getNome()
      : '⚠ sem paciente'
    const total      = subcards.reduce((acc, sc) => acc + sc.getTotal(), 0)
    const valorAtual = total > 0 ? formatarMoeda(total) : valorSpan.textContent
    const labLabel   = subcards.length > 0 && subcards[0].sbClin ? subcards[0].sbClin.getLabel() : ''
    if (miniAtivo) {
      // I1 — atualizar in-place
      miniAtivo._nome         = nomePac
      miniAtivo._valor        = valorAtual
      miniAtivo._labelClinica = labLabel
      miniAtivo.classList.toggle('mc-sem-paciente', nomePac === '⚠ sem paciente')
      if (miniAtivo._rebuild) miniAtivo._rebuild()
      atualizarRodapePainel()
      btnSalvarFila.textContent = '✓ Atualizado'
      btnSalvarFila.classList.add('salvo')
      setTimeout(() => { btnSalvarFila.textContent = '✎ Atualizar na fila'; btnSalvarFila.classList.remove('salvo') }, 2000)
    } else {
      // modo salvar novo — adiciona à fila e cria card vazio automaticamente
      adicionarNaFila(card, nomePac, 'clinica', valorAtual, labLabel, _capturarSnapshotClin())
      document.getElementById('statusGlobal').innerHTML = '<span class="ok">salvo na fila</span>'
      setTimeout(() => { document.getElementById('statusGlobal').innerHTML = '' }, 1500)
      // Feedback no botão antes de destruir o card
      btnSalvarFila.textContent = '✓ Adicionado!'
      btnSalvarFila.classList.add('salvo')
      // Pulso no painel lateral para direcionar o olhar
      const painel = document.getElementById('painelPendentes')
      painel.classList.remove('novo-item')
      void painel.offsetWidth  // reflow para reiniciar a animação
      painel.classList.add('novo-item')
      setTimeout(() => painel.classList.remove('novo-item'), 700)
      setTimeout(() => {
        adicionarCardClinica()
        requestAnimationFrame(() => {
          const inputFoco = document.querySelector('#listaClinicas .card input[type="text"]')
          if (inputFoco) inputFoco.focus()
        })
      }, 400)
    }
  })
  const info = document.createElement('div'); info.className = 'card-info'
  const nomeSpan = document.createElement('div'); nomeSpan.className = 'card-nome vazio'; nomeSpan.textContent = `clínicas #${contadorClinicas}`
  const metaSpan = document.createElement('div'); metaSpan.className = 'card-meta'
  const resumoDiv = document.createElement('div'); resumoDiv.className = 'card-resumo'
  const resumoNome = document.createElement('div'); resumoNome.className = 'card-resumo-nome'
  const resumoClinica = document.createElement('div'); resumoClinica.className = 'card-resumo-clinica'
  const resumoValor = document.createElement('div'); resumoValor.className = 'card-resumo-valor'
  const resumoTel = document.createElement('div'); resumoTel.className = 'card-resumo-tel'
  resumoDiv.appendChild(resumoNome); resumoDiv.appendChild(resumoClinica); resumoDiv.appendChild(resumoValor); resumoDiv.appendChild(resumoTel)
  info.appendChild(nomeSpan); info.appendChild(metaSpan); info.appendChild(resumoDiv)
  let _blocoPacienteClin = null
  let _subcardsRef = null
  const atualizarResumoClin = () => {
    const d = _blocoPacienteClin ? _blocoPacienteClin.getDados() : null
    resumoNome.textContent = d?.nome || nomeSpan.textContent
    resumoTel.textContent = d?.celular ? `Cel: ${d.celular}` : ''
    if (_subcardsRef && _subcardsRef.length > 0) {
      const sc = _subcardsRef[0]
      resumoClinica.textContent = sc.sbClin ? sc.sbClin.getLabel() : ''
      const total = _subcardsRef.reduce((acc, s) => acc + s.getTotal(), 0)
      resumoValor.textContent = total > 0 ? formatarMoeda(total) : ''
    }
  }
  const valorSpan = document.createElement('div'); valorSpan.className = 'card-valor zero'; valorSpan.textContent = 'R$ 0,00'
  const actionsDiv = document.createElement('div'); actionsDiv.className = 'card-actions'
  const btnRem = document.createElement('button'); btnRem.className = 'btn-rem'; btnRem.title = 'Novo agendamento (limpar)'; btnRem.textContent = '↺ novo'
  btnRem.addEventListener('click', e => {
    e.stopPropagation()
    // Se houver edição de fila em andamento neste card, cancela ela antes
    // de destruir, para não deixar o mini-card preso em mc-em-edicao
    if (card._modoEdicao && card._miniEmEdicao) {
      const miniEd = card._miniEmEdicao
      miniEd._marcado = miniEd._marcadoAntes ?? true
      miniEd.classList.toggle('marcado', miniEd._marcado)
      miniEd.classList.remove('mc-em-edicao')
      if (miniEd._rebuild) miniEd._rebuild()
      atualizarRodapePainel()
      card._modoEdicao = false
      card._miniEmEdicao = null
      _edicaoEmAndamento = false
      _restaurarTabs()
    }
    // I6 — verificar se card tem dados antes de destruir
    const temDados = _blocoPacienteClin?.getCodigo() ||
      subcards.some(sc => sc.getClinica() || sc.temExames())
    if (!temDados) { adicionarCardClinica(); return }
    // confirmação inline
    btnRem.style.display = 'none'
    const confirmDiv = document.createElement('span'); confirmDiv.className = 'btn-confirm-novo'
    confirmDiv.innerHTML = '<span style="font-size:.58rem;color:var(--warn);margin-right:.3rem">perderá os dados</span>'
    const btnOk  = document.createElement('button'); btnOk.className  = 'btn-rem'; btnOk.textContent = '✓'; btnOk.title = 'Confirmar'
    const btnCan = document.createElement('button'); btnCan.className = 'btn-rem'; btnCan.textContent = '✕'; btnCan.title = 'Cancelar'
    confirmDiv.appendChild(btnOk); confirmDiv.appendChild(btnCan)
    actionsDiv.insertBefore(confirmDiv, collapseBtn)
    const cancelar = () => { confirmDiv.remove(); btnRem.style.display = '' }
    const timer = setTimeout(cancelar, 6000)
    btnOk.addEventListener('click', ev => { ev.stopPropagation(); clearTimeout(timer); adicionarCardClinica() })
    btnCan.addEventListener('click', ev => { ev.stopPropagation(); clearTimeout(timer); cancelar() })
  })
  const collapseBtn = document.createElement('span'); collapseBtn.className = 'btn-icon card-collapse'; collapseBtn.textContent = '▾'; collapseBtn.style.cursor = 'pointer'
  actionsDiv.appendChild(btnRem); actionsDiv.appendChild(collapseBtn)
  top.appendChild(btnSalvarFila); top.appendChild(btnSalvarAlteracoesClin); top.appendChild(btnCancelarEdicaoClin); top.appendChild(info); top.appendChild(valorSpan); top.appendChild(actionsDiv)
  top.addEventListener('click', () => { card.classList.toggle('fechado'); atualizarResumoClin() })

  const body = document.createElement('div'); body.className = 'card-body'
  const atualizarValorHeader = () => {
    const total = subcards.reduce((acc, sc) => acc + sc.getTotal(), 0)
    valorSpan.textContent = formatarMoeda(total); valorSpan.classList.toggle('zero', total === 0)
    atualizarResumoClin()
  }
  const blocoPaciente = criarBlocoPaciente(dados => {
    nomeSpan.textContent = dados.nome; nomeSpan.classList.remove('vazio')
    metaSpan.innerHTML = `<span>${dados.cpf}</span><span class="tag">${dados.celular || 'sem cel'}</span>`
    if (card._sincronizarMiniCard) card._sincronizarMiniCard()
  })
  _blocoPacienteClin = blocoPaciente
  const listaSubcards = document.createElement('div'); listaSubcards.className = 'subcards-lista'

  const adicionarSubcard = () => {
    const scIdx = subcards.length + 1
    const subcard = document.createElement('div'); subcard.className = 'subcard'
    const scHeader = document.createElement('div'); scHeader.className = 'subcard-header'
    const scLabel  = document.createElement('span'); scLabel.className = 'subcard-label'; scLabel.textContent = `clínica ${scIdx}`
    const scBtnRem = document.createElement('button'); scBtnRem.className = 'btn-rem'; scBtnRem.textContent = '✕ remover clínica'
    scBtnRem.addEventListener('click', () => { const i = subcards.indexOf(scObj); if (i !== -1) subcards.splice(i, 1); subcard.remove(); atualizarValorHeader() })
    scHeader.appendChild(scLabel); scHeader.appendChild(scBtnRem)
    const scGrid = document.createElement('div'); scGrid.className = 'grid'
    const fieldClin = document.createElement('div'); fieldClin.className = 'field full'
    const lblClin = document.createElement('label'); lblClin.textContent = 'Clínica'
    const sbClin  = criarSearchbox(clinicasList.map(c => ({ value: c.id, label: c.nome })), 'buscar clínica...')
    const erroClin = document.createElement('div'); erroClin.className = 'erro-msg'
    fieldClin.appendChild(lblClin); fieldClin.appendChild(sbClin); fieldClin.appendChild(erroClin)

    const calHorClin = criarCalendarioHorario()
    const inputData = {
      get value() { return calHorClin.getValue().data },
      set value(_) { calHorClin.resetar() },
      classList: { add(c) { if(c==='erro') calHorClin.setErroData() }, remove(c) { if(c==='erro') calHorClin.limparErroData() } }
    }
    const inputHorario = {
      get value() { return calHorClin.getValue().horario },
      set value(v) { if (!v) { const inp = calHorClin.wrapper.querySelector('.cal-horario-input'); if (inp) inp.value = '' } },
      classList: { add(c) { if(c==='erro') calHorClin.setErroHorario() }, remove(c) { if(c==='erro') calHorClin.limparErroHorario() } }
    }
    const erroData = document.createElement('div'); erroData.className = 'erro-msg'

    scGrid.appendChild(fieldClin); scGrid.appendChild(calHorClin.wrapper)
    const fieldEx = document.createElement('div'); fieldEx.className = 'field full'
    const lblEx   = document.createElement('label'); lblEx.textContent = 'Exames'
    const campoExames = criarCampoExamesClinica(atualizarValorHeader, 'clinica')
    // Atualiza exames do subcard quando clínica é confirmada (clique ou Enter)
    sbClin.onConfirm(item => campoExames.atualizarClinica(item.value))
    const erroEx  = document.createElement('div'); erroEx.className = 'erro-msg'
    fieldEx.appendChild(lblEx); fieldEx.appendChild(campoExames); fieldEx.appendChild(erroEx)
    subcard.appendChild(scHeader); subcard.appendChild(scGrid); subcard.appendChild(fieldEx)
    listaSubcards.appendChild(subcard)
    const scObj = {
      getTotal: () => campoExames.getTotal(), getClinica: () => sbClin.getValor(),
      getData: () => inputData.value, getHorario: () => inputHorario.value,
      getExames: () => campoExames.getExames(), temExames: () => campoExames.temExames(),
      sbClin, inputData, inputHorario, campoExames,
      setDataHorario: (data, horario) => calHorClin.setValue(data, horario)
    }
    subcards.push(scObj)
  }
  adicionarSubcard()

  const btnAddClinica = document.createElement('button'); btnAddClinica.className = 'btn-add-clinica'; btnAddClinica.textContent = '+ adicionar clínica'
  btnAddClinica.addEventListener('click', e => { e.stopPropagation(); adicionarSubcard() })
  const statusDiv = document.createElement('div'); statusDiv.className = 'card-status'

  _subcardsRef = subcards
  body.appendChild(blocoPaciente); body.appendChild(listaSubcards); body.appendChild(btnAddClinica); body.appendChild(statusDiv)
  card.appendChild(top); card.appendChild(body)
  lista.appendChild(card); atualizarCountColunas()
  card.classList.add('entrando'); setTimeout(() => card.classList.remove('entrando'), 300)

  card._tipo     = 'clinica'
  card._getCheck = () => false
  card._modoEdicao   = false
  card._miniEmEdicao = null
  card._atualizarResumo = atualizarResumoClin

  // Captura snapshot do estado atual do card clínica
  const _capturarSnapshotClin = () => ({
    pacienteCodigo: _blocoPacienteClin.getCodigo(),
    subcards: subcards.map(sc => ({
      clinicaId:    sc.getClinica(),
      clinicaLabel: sc.sbClin.getLabel(),
      exames:       sc.getExames(),
      data:         sc.getData(),
      horario:      sc.getHorario()
    }))
  })

  // Alterna UI entre modo normal e modo edição
  const _atualizarUiEdicaoClin = () => {
    if (card._modoEdicao) {
      card.classList.add('card-em-edicao')
      btnSalvarFila.style.display = 'none'
      btnSalvarAlteracoesClin.style.display = ''
      btnCancelarEdicaoClin.style.display   = ''
    } else {
      card.classList.remove('card-em-edicao')
      btnSalvarFila.style.display = ''
      btnSalvarAlteracoesClin.style.display = 'none'
      btnCancelarEdicaoClin.style.display   = 'none'
    }
  }

  // Inicia edição: restaura estado do snapshot e entra em modo edição
  card._iniciarEdicao = async (mini) => {
    const snap = mini._snapshot
    if (!snap) return

    // Se card foi destruído pelo reset automático pós-salvamento, recriar e redirecionar
    if (!document.contains(card)) {
      adicionarCardClinica()
      const novoCard = document.querySelector('#listaClinicas .card')
      mini._cardRef = novoCard
      await novoCard._iniciarEdicao(mini)
      return
    }

    // (1) Restaurar paciente
    if (snap.pacienteCodigo) {
      const inputCod = blocoPaciente.querySelector('input[type="text"]')
      if (inputCod) {
        inputCod.value = snap.pacienteCodigo
        inputCod.dispatchEvent(new Event('input'))
      }
    }

    // (2) Restaurar subcards
    subcards.length = 0
    listaSubcards.innerHTML = ''
    for (const sc of (snap.subcards || [])) {
      adicionarSubcard()
      const scObj = subcards[subcards.length - 1]
      scObj.sbClin.preencherValor(sc.clinicaId, sc.clinicaLabel)
      await scObj.campoExames.atualizarClinica(sc.clinicaId)
      if (sc.exames?.length) scObj.campoExames.preencherExames(sc.exames)
      if (sc.data || sc.horario) scObj.setDataHorario(sc.data, sc.horario)
    }
    atualizarValorHeader()

    // (3) Entrar em modo edição visual
    card._modoEdicao = true
    card._miniEmEdicao = mini
    _atualizarUiEdicaoClin()
  }

  // Salvar alterações
  btnSalvarAlteracoesClin.addEventListener('click', e => {
    e.stopPropagation()
    const mini = card._miniEmEdicao
    if (!mini) return

    const novoSnap = _capturarSnapshotClin()
    mini._snapshot = novoSnap

    const nomePac = _blocoPacienteClin?.getCodigo()
      ? _blocoPacienteClin.getNome() : '⚠ sem paciente'
    const total = subcards.reduce((acc, sc) => acc + sc.getTotal(), 0)
    const valorAtual = total > 0 ? formatarMoeda(total) : valorSpan.textContent
    const labLabel = subcards.length > 0 && subcards[0].sbClin ? subcards[0].sbClin.getLabel() : ''

    mini._nome         = nomePac
    mini._valor        = valorAtual
    mini._labelClinica = labLabel
    mini.classList.toggle('mc-sem-paciente', nomePac === '⚠ sem paciente')

    mini._marcado = mini._marcadoAntes ?? true
    mini.classList.toggle('marcado', mini._marcado)
    mini.classList.remove('mc-em-edicao')
    if (mini._rebuild) mini._rebuild()
    atualizarRodapePainel()

    card._modoEdicao = false
    card._miniEmEdicao = null
    _atualizarUiEdicaoClin()
    _edicaoEmAndamento = false
    _restaurarTabs()
    adicionarCardClinica()
    requestAnimationFrame(() => {
      const inputFoco = document.querySelector('#listaClinicas .card input[type="text"]')
      if (inputFoco) inputFoco.focus()
    })
  })

  // Cancelar edição: sai do modo edição e apresenta card vazio
  btnCancelarEdicaoClin.addEventListener('click', e => {
    e.stopPropagation()
    const mini = card._miniEmEdicao
    if (!mini) return

    mini._marcado = mini._marcadoAntes ?? true
    mini.classList.toggle('marcado', mini._marcado)
    mini.classList.remove('mc-em-edicao')
    if (mini._rebuild) mini._rebuild()
    atualizarRodapePainel()

    card._modoEdicao = false
    card._miniEmEdicao = null
    _atualizarUiEdicaoClin()
    _edicaoEmAndamento = false
    _restaurarTabs()
    adicionarCardClinica()
    requestAnimationFrame(() => {
      const inputFoco = document.querySelector('#listaClinicas .card input[type="text"]')
      if (inputFoco) inputFoco.focus()
    })
  })
  // I3 — sincroniza nome e indicador do mini-card quando paciente é preenchido
  card._sincronizarMiniCard = () => {
    const mini = [...document.getElementById('listaPendentes')
      .querySelectorAll('.mini-card')].find(m => m._cardRef === card)
    if (!mini) return
    const temCodigo = _blocoPacienteClin?.getCodigo()
    mini._nome = temCodigo ? _blocoPacienteClin.getNome() : '⚠ sem paciente'
    mini.classList.toggle('mc-sem-paciente', !temCodigo)
    if (mini._rebuild) mini._rebuild()
    atualizarRodapePainel()
  }
  // I1 — atualiza label do botão conforme estado da fila
  card._atualizarBtnFila = () => {
    const mini = [...document.getElementById('listaPendentes')
      .querySelectorAll('.mini-card')].find(m => m._cardRef === card)
    btnSalvarFila.textContent = mini ? '✎ Atualizar na fila' : '＋ Salvar na Fila'
  }
  card._getDados = () => {
    let valido = true
    if (!blocoPaciente.getCodigo()) { blocoPaciente.setErro(); valido = false } else blocoPaciente.limparErro()
    if (!subcards.length) valido = false
    const agendamentos = []
    for (const sc of subcards) {
      if (!sc.getClinica())  { sc.sbClin.setErro();  valido = false } else sc.sbClin.limparErro()
      if (!sc.getData())     { sc.inputData.classList.add('erro');    valido = false } else sc.inputData.classList.remove('erro')
      if (!sc.getHorario())  { sc.inputHorario.classList.add('erro'); valido = false } else sc.inputHorario.classList.remove('erro')
      if (!sc.temExames())   { sc.campoExames.setErro();  valido = false } else sc.campoExames.limparErro()
      agendamentos.push({ codigoPaciente: blocoPaciente.getCodigo(), cpfPaciente: _blocoPacienteClin.getDados()?.cpf || null, datanascPaciente: _blocoPacienteClin.getDados()?.datanasc || null, codigoClinica: sc.getClinica(), exames: sc.getExames(), data: sc.getData(), horario: sc.getHorario(), tipoCard: 'clinica' })
    }
    if (!valido) return false
    return agendamentos
  }
  card._setStatus = (tipo, msg) => {
    statusDiv.textContent = msg; statusDiv.className = `card-status visivel ${tipo}`
    card.classList.toggle('processado', tipo === 'ok'); card.classList.toggle('erro', tipo === 'erro')
  }
}

// ─────────────────────────────────────────────────────────────
// PAINEL DE FILA — mini-cards adicionados via botão "Salvar na Fila"
// ─────────────────────────────────────────────────────────────
function atualizarRodapePainel() {
  const listaPendentes = document.getElementById('listaPendentes')
  const painelEmpty    = document.getElementById('painelEmpty')
  const countPendentes = document.getElementById('countPendentes')
  const footerCount    = document.getElementById('footerCount')
  const footerTotal    = document.getElementById('footerTotal')

  const miniCards = [...listaPendentes.querySelectorAll('.mini-card')]
  const marcados  = miniCards.filter(m => m._marcado)

  painelEmpty.style.display  = miniCards.length ? 'none' : ''
  countPendentes.textContent = String(miniCards.length)

  let totalMarcados = 0
  marcados.forEach(m => {
    if (m._modoCard === 'orcamento') return  // orçamentos não serão processados, não somam ao total
    const v = parseFloat((m._valor || '').replace(/~/, '').replace(/\(.*\)/, '').replace('R$','').replace(/\./g,'').replace(',','.')) || 0
    totalMarcados += v
  })

  const fmt = v => `R$ ${v.toFixed(2).replace('.', ',')}`
  footerCount.textContent = `${marcados.length} de ${miniCards.length} marcado${marcados.length !== 1 ? 's' : ''}`
  footerTotal.textContent = fmt(totalMarcados)
}

function adicionarNaFila(card, nome, tipo, valorTxt, labelClinica, snapshot = null, modoCard = 'agendar') {
  const listaPendentes = document.getElementById('listaPendentes')

  // C1 — Impede duplicata: aborta se o card já tem entrada ativa na fila
  const jaExiste = [...listaPendentes.querySelectorAll('.mini-card')]
    .some(m => m._cardRef === card)
  if (jaExiste) return false

  const tagClass = modoCard === 'orcamento' ? 'orc' : (tipo === 'lab' ? 'lab' : 'clin')
  const tagLabel = modoCard === 'orcamento' ? 'Orçamento' : (tipo === 'lab' ? 'Laboratório' : 'Clínica')

  const mini = document.createElement('div')
  mini.className = 'mini-card'
  mini._cardRef       = card
  mini._marcado       = false
  mini._valor         = valorTxt
  mini._tipo          = tipo
  mini._modoCard      = modoCard      // modo do card ao salvar na fila ('agendar' ou 'orcamento')
  mini._nome          = nome          // I1/I3 — mutável para atualização e sync
  mini._labelClinica  = labelClinica  // I1 — mutável para atualização
  mini._snapshot      = snapshot      // snapshot do estado ao salvar na fila

  // I3 — indicador visual se sem paciente
  if (nome === '⚠ sem paciente') mini.classList.add('mc-sem-paciente')

  const buildHtml = () => {
    const emEdicao = mini.classList.contains('mc-em-edicao')
    const isOrcamento = mini._modoCard === 'orcamento'
    const displayTagLabel = isOrcamento ? 'Orçamento' : tagLabel
    const displayTagClass = isOrcamento ? 'orc' : tagClass
    const displayTipo = isOrcamento ? 'Orçamento' : (tagLabel + (mini._labelClinica ? ' · ' + mini._labelClinica : ''))
    const checkHtml = isOrcamento
      ? `<div role="note" style="font-family:var(--mono);font-size:.6rem;color:var(--warn);margin-top:.35rem;padding:.25rem .5rem;background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.3);border-radius:4px;cursor:default;">⚠ apenas orçamento — converta para agendar</div>`
      : `<button class="mc-check-btn ${mini._marcado ? '' : 'desmarcado'}">${mini._marcado ? '✓ Marcado para enviar' : '○ Desmarcado'}</button>`
    mini.innerHTML = `
      <div class="mc-row-top">
        <div style="min-width:0">
          <div class="mc-nome">${escHTML(mini._nome)}</div>
          <div class="mc-tipo">${escHTML(displayTipo)}</div>
          ${emEdicao ? '<span class="mc-editando-badge">editando...</span>' : ''}
        </div>
        <div style="display:flex;gap:.2rem;flex-shrink:0">
          <button class="mc-btn-editar ${emEdicao ? 'mc-btn-disabled' : ''}" ${emEdicao ? 'disabled' : ''} title="Editar">✎</button>
          <button class="mc-btn-rem" title="Remover da fila">✕</button>
        </div>
      </div>
      <div class="mc-row-bot">
        <span class="mc-tags"><span class="mc-tag ${displayTagClass}">${displayTagLabel}</span></span>
        <span class="mc-valor">${mini._valor}</span>
      </div>
      ${checkHtml}`

    // I4 — remoção com undo de 5 segundos
    mini.querySelector('.mc-btn-rem').addEventListener('click', e => {
      e.stopPropagation()
      mini.style.visibility = 'hidden'
      const undo = document.createElement('div')
      undo.className = 'mc-undo'
      undo.innerHTML = 'Removido — <button class="mc-undo-btn">desfazer</button>'
      mini.parentNode.insertBefore(undo, mini.nextSibling)
      const timer = setTimeout(() => {
        mini.remove()
        undo.remove()
        atualizarRodapePainel()
      }, 5000)
      undo.querySelector('.mc-undo-btn').addEventListener('click', e => {
        e.stopPropagation()
        clearTimeout(timer)
        mini.style.visibility = ''
        undo.remove()
      })
    })

    // Listener botão editar
    const btnEditar = mini.querySelector('.mc-btn-editar')
    if (btnEditar && !emEdicao) {
      btnEditar.addEventListener('click', async (e) => {
        if (mini._recemSalvo) return
        // Bloqueia imediatamente qualquer segunda edição antes do await
        if (_edicaoEmAndamento) return
        e.stopPropagation()
        mini._marcadoAntes = mini._marcado
        mini._marcado = false
        mini.classList.remove('marcado')
        mini.classList.add('mc-em-edicao')
        buildHtml()
        atualizarRodapePainel()
        const abaAlvo = mini._tipo === 'lab' ? 'lab' : 'clinicas'
        ativarAba(abaAlvo)
        // Seta flag após ativarAba (para não bloquear a troca de aba)
        // mas antes do await (para fechar a race condition de edição dupla)
        _edicaoEmAndamento = true
        // Aguarda restauração completa após aba já estar ativa
        await mini._cardRef._iniciarEdicao(mini)
        focarCard(mini._cardRef, mini._tipo)
      })
    }

    mini.querySelector('.mc-check-btn')?.addEventListener('click', e => {
      e.stopPropagation()
      mini._marcado = !mini._marcado
      mini.classList.toggle('marcado', mini._marcado)
      buildHtml()
      atualizarRodapePainel()
    })

    // Click on mini-card body → navigate to card column and reveal card
    mini.addEventListener('click', e => {
      if (mini._recemSalvo) return
      if (e.target.closest('.mc-btn-rem') || e.target.closest('.mc-check-btn') || e.target.closest('.mc-undo') || e.target.closest('.mc-btn-editar') || e.target.closest('[role="note"]')) return
      focarCard(mini._cardRef, mini._tipo)
    })
  }

  mini._rebuild = buildHtml  // I1/I3 — expõe buildHtml para atualização externa

  buildHtml()
  listaPendentes.appendChild(mini)
  mini.classList.add('entrando')
  setTimeout(() => mini.classList.remove('entrando'), 300)
  // Flag temporal: bloqueia interações nos primeiros 500ms após salvar na fila,
  // impedindo que _iniciarEdicao seja disparado automaticamente pelo scroll/foco.
  mini._recemSalvo = true
  setTimeout(() => { mini._recemSalvo = false }, 500)
  mini.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
  atualizarRodapePainel()
}

// Navega até o card referenciado e garante que esteja expandido
function focarCard(card, tipo) {
  if (!card) return
  // Switch tab somente se necessário — evita disparar auto-criador de card via .click()
  const abaAlvo = tipo === 'lab' ? 'lab' : 'clinicas'
  const tabAlvo = document.getElementById(abaAlvo === 'lab' ? 'tabLab' : 'tabClinicas')
  if (!tabAlvo.classList.contains('ativo')) {
    ativarAba(abaAlvo)  // chama diretamente, não via .click()
  }
  // Expande o card
  if (card.classList.contains('fechado')) card.classList.remove('fechado')
  // Highlight temporário
  card.classList.add('card-highlight')
  setTimeout(() => card.classList.remove('card-highlight'), 1200)
  card.scrollIntoView({ behavior: 'smooth', block: 'start' })
  if (card._atualizarResumo) card._atualizarResumo()
}

// ─────────────────────────────────────────────────────────────
// PROCESSAMENTO — lê mini-cards marcados do painel
// ─────────────────────────────────────────────────────────────
async function processar() {
  const status       = document.getElementById('statusGlobal')
  const listaPendentes = document.getElementById('listaPendentes')
  const miniCards    = [...listaPendentes.querySelectorAll('.mini-card')]
  const marcados     = miniCards.filter(m => m._marcado && m._cardRef)

  if (!marcados.length) { status.innerHTML = '<span class="err">nenhum card marcado na fila</span>'; return }

  const marcadosFiltrados = marcados.filter(m => !m.classList.contains('mc-em-edicao'))

  if (!marcadosFiltrados.length) {
    status.innerHTML = '<span class="err">nenhum card marcado (ou todos em edição)</span>'
    return
  }

  const payloads = []
  for (const mini of marcadosFiltrados) {
    const card  = mini._cardRef
    const dados = card._getDados ? card._getDados() : null
    if (dados === null) continue   // null → modo orçamento, pular
    if (!dados) { status.innerHTML = '<span class="err">corrija os campos com erro nos cards</span>'; return }
    // dados false → falha de validação (campos incompletos)
    payloads.push({ card, mini, agendamentos: dados })
  }

  if (!payloads.length) {
    const ignorados = marcadosFiltrados.filter(m => {
      const d = m._cardRef?._getDados ? m._cardRef._getDados() : undefined
      return d === null
    }).length
    const sufixo = ignorados > 0
      ? ` — ${ignorados} item(ns) de orçamento ignorado(s): converta para modo agendar`
      : ''
    status.innerHTML = `<span class="err">nenhum card em modo agendar na fila${sufixo}</span>`
    return
  }

  status.innerHTML = `processando ${payloads.length} card(s)...`

  for (const { card, mini, agendamentos } of payloads) {
    card._setStatus('', 'processando...')
    try {
      const resultados = await window.electronAPI.agendar(agendamentos)
      const erros      = resultados.filter(r => !r.sucesso)
      if (erros.length) {
        card._setStatus('erro', erros.map(e => e.erro).join(' · '))
      } else {
        card._setStatus('ok', resultados.map(r => `✓ ${r.nomePaciente}`).join(' · '))
        setTimeout(() => {
          card.remove()
          mini.remove()
          atualizarCountColunas()
          atualizarRodapePainel()
        }, 1500)
      }
    } catch (err) {
      card._setStatus('erro', err.message)
    }
  }
  status.innerHTML = `<span class="ok">processamento concluído</span>`
}

function desmarcarTodos() {
  const listaPendentes = document.getElementById('listaPendentes')
  listaPendentes.querySelectorAll('.mini-card').forEach(m => {
    if (m._marcado) {
      m._marcado = false
      m.classList.remove('marcado')
      if (m._rebuild) m._rebuild()
    }
  })
  atualizarRodapePainel()
}

  if (tL) { tL.style.opacity = ''; tL.style.cursor = ''; tL.title = '' }
}

        const tabOposta = aba === 'clinicas' ? tabLab : tabClinicas
        tabOposta.style.opacity = '0.45'
        tabOposta.style.cursor = 'not-allowed'
        tabOposta.title = 'edição em andamento — salve ou cancele primeiro'
        setTimeout(() => {
          tabOposta.style.opacity = ''
          tabOposta.style.cursor = ''
          tabOposta.title = ''
        }, 3000)
        return
      }
    }

    // Ocultar painel sistema e restaurar workspace por padrão
    painelSistema.classList.remove('visivel')
    workspace.style.display = ''

    if (aba === 'clinicas') {
      tabClinicas.classList.add('ativo'); tabLab.classList.remove('ativo'); tabSistema.classList.remove('ativo')
      colClinicas.classList.remove('oculta'); colLab.classList.add('oculta')
      if (!document.querySelector('#listaClinicas .card')) adicionarCardClinica()
    } else if (aba === 'lab') {
      tabLab.classList.add('ativo'); tabClinicas.classList.remove('ativo'); tabSistema.classList.remove('ativo')
      colLab.classList.remove('oculta'); colClinicas.classList.add('oculta')
      if (!document.querySelector('#listaLab .card')) adicionarCardLab()
    } else if (aba === 'sistema') {
      tabSistema.classList.add('ativo'); tabClinicas.classList.remove('ativo'); tabLab.classList.remove('ativo')
      // Oculta o workspace e exibe o webview em tela cheia abaixo da topbar
      workspace.style.display = 'none'
      painelSistema.classList.add('visivel')
    }
  }

  tabClinicas.addEventListener('click', e => { e.stopPropagation(); ativarAba('clinicas') })
  tabLab.addEventListener('click',      e => { e.stopPropagation(); ativarAba('lab') })
  tabSistema.addEventListener('click',  e => { e.stopPropagation(); ativarAba('sistema') })

  // Start on clínicas (card criado após inicializar())
  ativarAba('clinicas')
})()

inicializar()
</script>

<!-- ── MODAL QR CODE WHATSAPP ── -->
<div id="qr-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9999;align-items:center;justify-content:center;flex-direction:column;">
  <div style="background:#fff;padding:2rem 2.5rem;border-radius:14px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.35);">
    <p style="margin-bottom:1.25rem;font-weight:600;font-family:var(--sans);font-size:.95rem;color:#111827;">
      Escaneie com o WhatsApp para conectar
    </p>
    <canvas id="qr-canvas" style="display:none"></canvas>
    <img id="qr-img" src="" alt="QR Code WhatsApp" style="width:260px;height:260px;border-radius:8px;display:block;margin:0 auto;"/>
    <p id="qr-status-txt" style="margin-top:.85rem;color:#6b7280;font-size:.78rem;font-family:var(--mono);">
      Aguardando scan...
    </p>
  </div>
</div>

<script>
// ── Integração Electron IPC ──────────────────────────────────
// Só executa quando window.electronAPI estiver disponível
// (injetado pelo preload.cjs). Em browser comum, bloco ignorado.
if (window.electronAPI) {

  // Sinaliza ao main.cjs que o renderer está pronto para receber eventos.
  // Resolve a race condition do QR Code — o main.cjs reenvia o QR pendente
  // assim que receber este sinal.
  window.electronAPI.rendererReady()

  // Repassa navegações do <webview> ao main.cjs para captura de cookie de sessão
  const wv = document.getElementById('webviewSistema')
  if (wv) {
    wv.addEventListener('did-navigate',         e => window.electronAPI.webviewNavegou(e.url))
    wv.addEventListener('did-navigate-in-page', e => window.electronAPI.webviewNavegou(e.url))
  }

  // QR Code do Baileys — recebe PNG base64 gerado no main.cjs e exibe via <img>
  window.electronAPI.onQrCode(dataUrl => {
    const overlay = document.getElementById('qr-overlay')
    overlay.style.display = 'flex'
    document.getElementById('qr-img').src = dataUrl
    document.getElementById('qr-status-txt').textContent = 'Aguardando scan...'
  })

  // Status do WhatsApp — fecha modal ao conectar, atualiza topbar
  window.electronAPI.onWhatsappStatus(status => {
    if (status === 'conectado') {
      document.getElementById('qr-overlay').style.display = 'none'
    }
    // Sincroniza com o indicador existente na topbar
    const s = document.getElementById('statusGlobal')
    if (!s) return
    if (status === 'conectado') {
      s.innerHTML = '<span class="ok">WA conectado</span>'
      setTimeout(() => { s.innerHTML = '' }, 3000)
    } else if (status === 'aguardando_qr' || status === 'connecting') {
      s.innerHTML = '<span style="color:var(--warn)">WA conectando...</span>'
    } else if (status === 'disconnected' || status === 'reconnecting') {
      s.innerHTML = '<span class="err">WA desconectado</span>'
    }
  })

  // Sessão expirada — avisa o operador na topbar e abre aba do sistema automaticamente
  window.electronAPI.onSessaoExpirada(() => {
    const s = document.getElementById('statusGlobal')
    if (s) s.innerHTML = '<span class="err">sessão expirada — faça login</span>'
    ativarAba('sistema')
  })

  // Sessão restaurada — feedback positivo breve
  window.electronAPI.onSessaoOk(() => {
    const s = document.getElementById('statusGlobal')
    if (s) {
      s.innerHTML = '<span class="ok">sessão restaurada</span>'
      setTimeout(() => { s.innerHTML = '' }, 3000)
    }
  })
}
</script>
