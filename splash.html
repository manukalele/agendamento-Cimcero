<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1f36;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      width: 52px; height: 52px;
      background: #3b5bdb;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 700;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      color: #fff; margin-bottom: 1.2rem; letter-spacing: -0.02em;
    }
    .app-name {
      font-size: 1rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #c5cae9; margin-bottom: 2rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #252d52;
      border-top-color: #3b5bdb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.72rem; color: #6b7cad;
      letter-spacing: 0.04em; min-height: 1.2em;
    }
    .rodape {
      position: absolute; bottom: 1.2rem;
      font-size: 0.62rem; color: #3a4470; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="logo">Rx</div>
  <div class="app-name">Agendamentos</div>
  <div class="spinner"></div>
  <div class="status" id="status">Iniciando...</div>
  <div class="rodape" id="versao">v1.0.0</div>
  <script>
    if (window.electronAPI) {
      window.electronAPI.onSplashStatus(msg => {
        document.getElementById('status').textContent = msg
      })
      window.electronAPI.getVersao().then(v => {
        document.getElementById('versao').textContent = 'v' + v
      }).catch(() => {})
    }
  </script>
</body>
</html>
